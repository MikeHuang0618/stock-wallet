name: Release

# 推一個 v* 標籤(例如 git tag v0.7.0 && git push origin v0.7.0)即自動:
# 跑測試 → PyInstaller onedir 打包 → 產生安裝檔(Inno Setup)+ 可攜 zip → 附到 GitHub Release。
# 用 onedir(非 onefile):onefile 執行時自解壓到暫存資料夾,較易被防毒啟發式誤判;
# onedir + 安裝檔的誤報明顯較少,安裝檔為主要交付。
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install deps
        run: pip install -r requirements-dev.txt

      - name: Test (release gate)
        run: pytest

      - name: Generate icon
        run: python make_icon.py

      - name: Build app (PyInstaller onedir)
        run: >
          pyinstaller --noconfirm --onedir --windowed --name StockWallet
          --icon icon.ico --add-data "icon.ico;." --add-data "web;web"
          --collect-all webview --collect-all winotify app.py

      - name: Zip portable build
        run: Compress-Archive -Path dist\StockWallet\* -DestinationPath StockWallet-portable-${{ github.ref_name }}.zip

      - name: Build installer (Inno Setup)
        run: |
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=${{ github.ref_name }} installer\StockWallet.iss

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/Output/StockWallet-Setup.exe
            StockWallet-portable-${{ github.ref_name }}.zip
          generate_release_notes: true
